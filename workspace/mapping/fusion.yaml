mapping:
  nodes:

  - !Storage
    component: MainMemory
    tensors:
      - enc_input_raw
      - enc_w_query
      - enc_w_key
      - enc_w_value
      - enc_w_out
      - enc_w_ffn_up
      - enc_w_ffn_down
      - corpus_embeddings
      - topk_doc_ids
      - topk_tokens
      - dec_w_query
      - dec_w_key
      - dec_w_value
      - dec_w_out
      - dec_w_ffn_gate
      - dec_w_ffn_up
      - dec_w_ffn_down
      - query_embedding
      - doc_scores
      - dec_ffn_out
      
  - !Storage
    component: GlobalBuffer
    tensors:

  - !Storage
    component: LocalBuffer
    tensors:

  - !Storage
    component: Register
    tensors:

  - !Storage
    component: OnChipSRAM
    tensors: [enc_input, enc_queries, enc_keys, enc_values, enc_attn_scores, enc_attn_weights, enc_attn_out, enc_attn_proj, enc_ffn_hidden, enc_ffn_hidden_act, enc_ffn_out, dec_input, dec_queries, dec_keys, dec_values, dec_attn_scores, dec_attn_weights, dec_attn_out, dec_attn_proj, dec_ffn_gate, dec_ffn_up, dec_ffn_gate_act, dec_ffn_swiglu]

  - !Sequential
    nodes:
    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [enc_input]}
      - !Temporal {rank_variable: enc_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: enc_hidden, tile_shape: 1}
      - !Compute {component: Copy, einsum: EncInputLoad}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [enc_queries]}
      - !Temporal {rank_variable: enc_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: enc_num_heads, tile_shape: 1}
      - !Temporal {rank_variable: enc_head_dim, tile_shape: 1}
      - !Compute {component: MAC, einsum: EncQueryProj}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [enc_keys]}
      - !Temporal {rank_variable: enc_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: enc_num_heads, tile_shape: 1}
      - !Temporal {rank_variable: enc_head_dim, tile_shape: 1}
      - !Compute {component: MAC, einsum: EncKeyProj}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [enc_values]}
      - !Temporal {rank_variable: enc_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: enc_num_heads, tile_shape: 1}
      - !Temporal {rank_variable: enc_head_dim, tile_shape: 1}
      - !Compute {component: MAC, einsum: EncValueProj}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [enc_attn_scores]}
      - !Temporal {rank_variable: enc_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: enc_num_heads, tile_shape: 1}
      - !Temporal {rank_variable: enc_head_dim, tile_shape: 1}
      - !Compute {component: MAC, einsum: EncAttentionScores}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [enc_attn_weights]}
      - !Temporal {rank_variable: enc_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: enc_num_heads, tile_shape: 1}
      - !Compute {component: Copy, einsum: EncAttentionWeights}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [enc_attn_out]}
      - !Temporal {rank_variable: enc_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: enc_num_heads, tile_shape: 1}
      - !Temporal {rank_variable: enc_head_dim, tile_shape: 1}
      - !Compute {component: MAC, einsum: EncAttentionOut}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [enc_attn_proj]}
      - !Temporal {rank_variable: enc_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: enc_hidden, tile_shape: 1}
      - !Temporal {rank_variable: enc_num_heads, tile_shape: 1}
      - !Compute {component: MAC, einsum: EncAttentionProj}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [enc_ffn_hidden]}
      - !Temporal {rank_variable: enc_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: enc_ffn_mid, tile_shape: 1}
      - !Compute {component: MAC, einsum: EncFfnUp}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [enc_ffn_hidden_act]}
      - !Temporal {rank_variable: enc_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: enc_ffn_mid, tile_shape: 1}
      - !Compute {component: Copy, einsum: EncGeluActivation}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [enc_ffn_out]}
      - !Temporal {rank_variable: enc_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: enc_embed_dim, tile_shape: 1}
      - !Compute {component: MAC, einsum: EncFfnDown}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Temporal {rank_variable: enc_embed_dim, tile_shape: 1}
      - !Compute {component: Copy, einsum: ClsPooling}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [doc_scores]}
      - !Temporal {rank_variable: num_docs, tile_shape: 1}
      - !Temporal {rank_variable: enc_embed_dim, tile_shape: 1}
      - !Compute {component: MAC, einsum: FaissScoreComputation}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Temporal {rank_variable: top_k_docs, tile_shape: 1}
      - !Temporal {rank_variable: doc_len, tile_shape: 1}
      - !Compute {component: Copy, einsum: DocumentGather}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [dec_input]}
      - !Temporal {rank_variable: dec_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: dec_hidden, tile_shape: 1}
      - !Compute {component: Copy, einsum: DecoderInputSetup}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [dec_queries]}
      - !Temporal {rank_variable: dec_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: dec_num_heads, tile_shape: 1}
      - !Temporal {rank_variable: dec_head_dim, tile_shape: 1}
      - !Compute {component: MAC, einsum: DecQueryProj}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [dec_keys]}
      - !Temporal {rank_variable: dec_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: dec_num_heads, tile_shape: 1}
      - !Temporal {rank_variable: dec_head_dim, tile_shape: 1}
      - !Compute {component: MAC, einsum: DecKeyProj}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [dec_values]}
      - !Temporal {rank_variable: dec_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: dec_num_heads, tile_shape: 1}
      - !Temporal {rank_variable: dec_head_dim, tile_shape: 1}
      - !Compute {component: MAC, einsum: DecValueProj}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [dec_attn_scores]}
      - !Temporal {rank_variable: dec_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: dec_num_heads, tile_shape: 1}
      - !Temporal {rank_variable: dec_head_dim, tile_shape: 1}
      - !Compute {component: MAC, einsum: DecAttentionScores}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [dec_attn_weights]}
      - !Temporal {rank_variable: dec_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: dec_num_heads, tile_shape: 1}
      - !Compute {component: Copy, einsum: DecAttentionWeights}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [dec_attn_out]}
      - !Temporal {rank_variable: dec_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: dec_num_heads, tile_shape: 1}
      - !Temporal {rank_variable: dec_head_dim, tile_shape: 1}
      - !Compute {component: MAC, einsum: DecAttentionOut}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [dec_attn_proj]}
      - !Temporal {rank_variable: dec_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: dec_hidden, tile_shape: 1}
      - !Temporal {rank_variable: dec_num_heads, tile_shape: 1}
      - !Compute {component: MAC, einsum: DecAttentionProj}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [dec_ffn_gate]}
      - !Temporal {rank_variable: dec_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: dec_ffn_mid, tile_shape: 1}
      - !Compute {component: MAC, einsum: DecFfnGate}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [dec_ffn_up]}
      - !Temporal {rank_variable: dec_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: dec_ffn_mid, tile_shape: 1}
      - !Compute {component: MAC, einsum: DecFfnUp}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [dec_ffn_gate_act]}
      - !Temporal {rank_variable: dec_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: dec_ffn_mid, tile_shape: 1}
      - !Compute {component: Copy, einsum: DecFfnGateAct}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Storage {component: OnChipSRAM, tensors: [dec_ffn_swiglu]}
      - !Temporal {rank_variable: dec_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: dec_ffn_mid, tile_shape: 1}
      - !Compute {component: Copy, einsum: SwigluElementwiseMult}

    - !Nested
      nodes:
      - !Temporal {rank_variable: batch, tile_shape: 1}
      - !Temporal {rank_variable: dec_seq_len, tile_shape: 1}
      - !Temporal {rank_variable: dec_hidden, tile_shape: 1}
      - !Compute {component: MAC, einsum: DecFfnDown}