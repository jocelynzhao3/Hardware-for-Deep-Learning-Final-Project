# Norm Jouppi, George Kurian, Sheng Li, Peter Ma, Rahul Nagarajan, Lifeng Nai, Nishant
# Patil, Suvinay Subramanian, Andy Swing, Brian Towles, Clifford Young, Xiang Zhou,
# Zongwei Zhou, and David A Patterson. 2023. TPU v4: An Optically Reconfigurable
# Supercomputer for Machine Learning with Hardware Support for Embeddings. In
# Proceedings of the 50th Annual International Symposium on Computer Architecture (ISCA
# '23). Association for Computing Machinery, New York, NY, USA, Article 82, 1–14.
# https://doi.org/10.1145/3579371.3589350
#
# ─────────────────────────────────────────────────────────────────────────────
# Experiment 2 conceptual remapping (see workspace/Experiment-2-Caching.ipynb)
# ─────────────────────────────────────────────────────────────────────────────
# For Experiment 2 (EdgeRAG-style caching), use a four-tier hierarchy:
#
#   LocalBuffer   → on-chip SRAM scratchpad (not part of cache policy)
#   GlobalBuffer  → on-chip SRAM cache (L2 in the cache analysis)
#   MainMemory    → off-chip DRAM cache (sweepable)
#   Disk          → backing NVMe SSD tier (infinite capacity)
#
# All levels remain parameterized via Jinja defaults so the notebook can sweep
# them via `arch_overrides` (same pattern as arch/basic8.yaml).

# ── LocalBuffer (on-chip SRAM L1 scratchpad) ────────────────────────────────
{% set LOCAL_BUFFER_MB                = LOCAL_BUFFER_MB                | default(4)     %}  {# Per-bank size in MB #}
{% set LOCAL_READ_ENERGY_pJ_per_bit   = LOCAL_READ_ENERGY_pJ_per_bit   | default(0.249) %}
{% set LOCAL_WRITE_ENERGY_pJ_per_bit  = LOCAL_WRITE_ENERGY_pJ_per_bit  | default(0.293) %}

# ── GlobalBuffer (on-chip SRAM cache) ────────────────────────────────────────
{% set GLOBAL_BUFFER_MB               = GLOBAL_BUFFER_MB               | default(128)   %}
{% set GLOBAL_READ_BW_GBps            = GLOBAL_READ_BW_GBps            | default(2048)  %}
{% set GLOBAL_WRITE_BW_GBps           = GLOBAL_WRITE_BW_GBps           | default(1024)  %}
{% set GLOBAL_READ_ENERGY_pJ_per_bit  = GLOBAL_READ_ENERGY_pJ_per_bit  | default(1.88)  %}
{% set GLOBAL_WRITE_ENERGY_pJ_per_bit = GLOBAL_WRITE_ENERGY_pJ_per_bit | default(2.36)  %}

# ── MainMemory (off-chip DRAM cache) ────────────────────────────────────────
{% set MAIN_MEMORY_GB                 = MAIN_MEMORY_GB                 | default(8)     %}
{% set MAIN_MEMORY_BW_GBps            = MAIN_MEMORY_BW_GBps            | default(614)   %}
{% set MAIN_MEMORY_ENERGY_pJ_per_bit  = MAIN_MEMORY_ENERGY_pJ_per_bit  | default(7.03)  %}

# ── Disk (NVMe backing store) ────────────────────────────────────────────────
{% set DISK_READ_ENERGY_J_per_access   = DISK_READ_ENERGY_J_per_access   | default(10e-9)  %}
{% set DISK_WRITE_ENERGY_J_per_access  = DISK_WRITE_ENERGY_J_per_access  | default(20e-9)  %}
{% set DISK_READ_LATENCY_s_per_access  = DISK_READ_LATENCY_s_per_access  | default(100e-6) %}
{% set DISK_WRITE_LATENCY_s_per_access = DISK_WRITE_LATENCY_s_per_access | default(100e-6) %}

# ── Compute ─────────────────────────────────────────────────────────────────
{% set MAC_ENERGY_pJ                  = MAC_ENERGY_pJ                  | default(0.084) %}
{% set MAC_CLOCK_GHz                  = MAC_CLOCK_GHz                  | default(1.05)  %}

arch:
  nodes:

  - !Memory
    name: Disk
    size: inf
    leak_power: 0
    area: 0
    actions:
    - {name: read,  energy: {{DISK_READ_ENERGY_J_per_access}},  latency: {{DISK_READ_LATENCY_s_per_access}}}
    - {name: write, energy: {{DISK_WRITE_ENERGY_J_per_access}}, latency: {{DISK_WRITE_LATENCY_s_per_access}}}
    tensors: {keep: ~Intermediates, may_keep: All}

  - !Memory
    name: MainMemory
    size: {{MAIN_MEMORY_GB}}*1024*1024*1024*8
    leak_power: 0
    area: 0   # off-chip DRAM; do not include in chip area
    actions:
    - {name: read,  energy: {{MAIN_MEMORY_ENERGY_pJ_per_bit}}e-12, latency: 1 / ({{MAIN_MEMORY_BW_GBps}}e9 * 8)}
    - {name: write, energy: {{MAIN_MEMORY_ENERGY_pJ_per_bit}}e-12, latency: 1 / ({{MAIN_MEMORY_BW_GBps}}e9 * 8)}
    tensors: {keep: ~Disk.tensors, may_keep: All}

  - !Memory
    name: GlobalBuffer
    size: {{GLOBAL_BUFFER_MB}}*1024*1024*8                # GlobalBuffer size in bits
    total_latency: max(read_latency, write_latency)       # Separate ports
    leak_power: 0
    area: 112e-6                                          # From TPU v4i paper fig. 6
    actions:
    - {name: read,  energy: {{GLOBAL_READ_ENERGY_pJ_per_bit}}e-12,  latency: 1 / ({{GLOBAL_READ_BW_GBps}}e9 * 8)}
    - {name: write, energy: {{GLOBAL_WRITE_ENERGY_pJ_per_bit}}e-12, latency: 1 / ({{GLOBAL_WRITE_BW_GBps}}e9 * 8)}
    tensors: {keep: ~MainMemory.tensors, may_keep: All}

  - !Memory
    name: LocalBuffer
    spatial: [{name: Z, fanout: 4, may_reuse: Nothing, min_usage: 1}]
    size: {{LOCAL_BUFFER_MB}}*1024*1024*8                 # Per-bank LocalBuffer size in bits
    leak_power: 0
    area: 51e-6                                           # From TPU v4i paper fig. 6
    actions:
    - {name: read,  energy: {{LOCAL_READ_ENERGY_pJ_per_bit}}e-12,  latency: 0}
    - {name: write, energy: {{LOCAL_WRITE_ENERGY_pJ_per_bit}}e-12, latency: 0}
    tensors: {keep: input | output}

  # Slow scalar unit; handles non-MAC operations like softmax placeholders
  - !Compute
    name: ScalarUnit
    area: 8.7e-6                                          # From die photo
    leak_power: 0
    actions:
    - {name: compute, energy: 0, latency: 1 / ({{MAC_CLOCK_GHz}}e9) / 128}
    enabled: len(All) == 2

  - !Container
    name: ProcessingElement
    spatial:
    - {name: reuse_input,  fanout: 128, may_reuse: input,  reuse: input,  min_usage: 1}
    - {name: reuse_output, fanout: 128, may_reuse: output, reuse: output, min_usage: 1}

  - !Memory
    name: Register
    size: 8                                               # 1 byte
    area: 8.5e-11                                         # ~10% of 14 mm^2 128x128 MAC array
    leak_power: 0
    actions:
    - {name: read,  energy: 0, latency: 0}
    - {name: write, energy: 0, latency: 0}
    tensors: {keep: weight}

  - !Compute
    name: MAC
    leak_power: 0
    area: 8.5e-10                                         # ~90% of 14 mm^2 128x128 MAC array
    actions:
    - {name: compute, energy: {{MAC_ENERGY_pJ}}e-12, latency: 1 / ({{MAC_CLOCK_GHz}}e9)}
    enabled: len(All) == 3

variables:
  supported_input_bits:  8
  supported_weight_bits: 8
  supported_output_bits: 8
