# =============================================================================
# mapping_aggressive_fused.yaml
#
# Fusion Strategy: Aggressive — minimize DRAM round-trips end-to-end
#
# Fused groups (each group's internal tensors live only on OnChipSRAM):
#
#  [ENC-A] QKV projections for encoder:
#          enc_input -> {enc_queries, enc_keys, enc_values}
#          All three weight reads are amortized over the same enc_input tile.
#
#  [ENC-B] Full encoder attention kernel (FlashAttention-style):
#          enc_queries, enc_keys, enc_values
#          -> enc_attn_scores (on-chip, never DRAM)
#          -> enc_attn_weights (on-chip, never DRAM)
#          -> enc_attn_out
#          -> enc_attn_proj  (output projection folded in)
#
#  [ENC-C] Encoder FFN:
#          enc_attn_proj -> enc_ffn_hidden (on-chip) -> enc_ffn_hidden_act (on-chip)
#          -> enc_ffn_out
#
#  [DEC-A] QKV projections for decoder (mirror of ENC-A)
#
#  [DEC-B] Full decoder attention kernel + output projection (mirror of ENC-B)
#
#  [DEC-C] SwiGLU FFN:
#          dec_attn_proj -> dec_ffn_gate (on-chip) -> dec_ffn_up (on-chip)
#          -> dec_ffn_gate_act (on-chip) -> dec_ffn_swiglu (on-chip)
#          -> dec_ffn_out
#
# FAISS / retrieval einsums are left un-fused: they are memory-bound by
# corpus_embeddings (too large for SRAM) and have no compute to hide latency.
#
# Tile discipline:
#   All tile_shape values are 1 (un-tiled) so that accelforge can infer the
#   minimum live set and verify SRAM capacity. A real implementation would
#   tune tile_shape for the 8 MB SRAM budget.
# =============================================================================

mapping:
  nodes:

  # ---------------------------------------------------------------------------
  # Default storage: DRAM for all tensors not captured inside a fused group.
  # ---------------------------------------------------------------------------
  - !Storage
    component: MainMemory
    tensors:
      # Encoder weights (streamed from DRAM, never buffered long-term in SRAM)
      - enc_W_query
      - enc_W_key
      - enc_W_value
      - enc_W_out
      - enc_W_ffn_up
      - enc_W_ffn_down
      # Encoder boundary activations (cross-group I/O)
      - enc_input
      - enc_input_raw
      - enc_queries
      - enc_keys
      - enc_values
      - enc_attn_proj
      - enc_ffn_out
      - query_embedding
      # Retrieval
      - doc_scores
      - topk_doc_ids
      - topk_tokens
      # Decoder weights
      - dec_W_query
      - dec_W_key
      - dec_W_value
      - dec_W_out
      - dec_W_ffn_gate
      - dec_W_ffn_up
      - dec_W_ffn_down
      # Decoder boundary activations
      - dec_input
      - dec_queries
      - dec_keys
      - dec_values
      - dec_attn_proj
      - dec_ffn_out

  # corpus lives on Disk
  - !Storage
    component: Disk
    tensors:
      - corpus_embeddings
      - corpus_tokens

  # ---------------------------------------------------------------------------
  # Input copy (not worth fusing; trivial bandwidth)
  # ---------------------------------------------------------------------------
  - !Nested
    nodes:
    - !Temporal
      rank_variable: batch
      tile_shape: 1
    - !Temporal
      rank_variable: enc_seq_len
      tile_shape: 1
    - !Compute
      component: Copy
      einsum: "enc_input[batch, enc_seq_len, enc_hidden] = enc_input_raw[batch, enc_seq_len, enc_hidden]"

  # ===========================================================================
  # [ENC-A]  Encoder QKV projections — fused
  #
  # enc_input is read ONCE from DRAM into SRAM and reused for all three
  # weight projections. enc_queries / enc_keys / enc_values are written back
  # to DRAM because [ENC-B] needs to read them; they are too large to keep
  # on-chip across groups at 8 MB SRAM with INT8.
  # ===========================================================================
  - !Sequential
    nodes:

    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [enc_input]          # tile of input reused for Q, K, V
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: enc_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "enc_queries[batch, enc_seq_len, enc_num_heads, enc_head_dim] = enc_input[batch, enc_seq_len, enc_hidden] * enc_W_query[enc_num_heads, enc_head_dim, enc_hidden]"

    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [enc_input]          # same tile re-read from SRAM for K
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: enc_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "enc_keys[batch, enc_seq_len, enc_num_heads, enc_head_dim] = enc_input[batch, enc_seq_len, enc_hidden] * enc_W_key[enc_num_heads, enc_head_dim, enc_hidden]"

    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [enc_input]          # same tile re-read from SRAM for V
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: enc_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "enc_values[batch, enc_seq_len, enc_num_heads, enc_head_dim] = enc_input[batch, enc_seq_len, enc_hidden] * enc_W_value[enc_num_heads, enc_head_dim, enc_hidden]"

  # ===========================================================================
  # [ENC-B]  Encoder attention kernel — aggressively fused
  #
  # Internal tensors (enc_attn_scores, enc_attn_weights) never leave SRAM.
  # This mirrors FlashAttention: for each (query_tile × kv_tile × head) slice
  # scores are computed, softmax-normalised, and immediately used to accumulate
  # into enc_attn_out — all without writing scores to DRAM.
  #
  # enc_attn_out is then folded into enc_attn_proj (output projection) within
  # the same Sequential block, so enc_attn_out also stays on-chip.
  # ===========================================================================
  - !Sequential
    nodes:

    # Step 1: Q·Kᵀ  ->  enc_attn_scores (on-chip)
    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [enc_attn_scores]
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: enc_kv_pos
        tile_shape: 1
      - !Temporal
        rank_variable: enc_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "enc_attn_scores[batch, enc_seq_len, enc_kv_pos, enc_num_heads] = enc_queries[batch, enc_seq_len, enc_num_heads, enc_head_dim] * enc_keys[batch, ENC_SEQ_LEN: enc_kv_pos, enc_num_heads, enc_head_dim]"

    # Step 2: softmax (copy)  ->  enc_attn_weights (on-chip)
    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [enc_attn_scores, enc_attn_weights]
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: enc_kv_pos
        tile_shape: 1
      - !Temporal
        rank_variable: enc_num_heads
        tile_shape: 1
      - !Compute
        component: Copy
        einsum: "enc_attn_weights[batch, enc_seq_len, enc_kv_pos, enc_num_heads] = enc_attn_scores[batch, enc_seq_len, enc_kv_pos, enc_num_heads]"

    # Step 3: weighted value aggregation  ->  enc_attn_out (on-chip)
    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [enc_attn_weights, enc_attn_out]
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: enc_kv_pos
        tile_shape: 1
      - !Temporal
        rank_variable: enc_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "enc_attn_out[batch, enc_seq_len, enc_num_heads, enc_head_dim] = enc_attn_weights[batch, enc_seq_len, enc_kv_pos, enc_num_heads] * enc_values[batch, ENC_SEQ_LEN: enc_kv_pos, enc_num_heads, enc_head_dim]"

    # Step 4: output projection  (enc_attn_out on-chip -> enc_attn_proj to DRAM)
    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [enc_attn_out]       # consumed here; freed after this step
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "enc_attn_proj[batch, enc_seq_len, enc_hidden] = enc_attn_out[batch, enc_seq_len, enc_num_heads, enc_head_dim] * enc_W_out[enc_num_heads, enc_head_dim, enc_hidden]"

  # ===========================================================================
  # [ENC-C]  Encoder FFN — fused (GELU MLP, standard 2-op)
  #
  # enc_ffn_hidden and enc_ffn_hidden_act stay on-chip; only enc_ffn_out
  # goes back to DRAM as the layer output.
  # ===========================================================================
  - !Sequential
    nodes:

    # FFN up-projection  ->  enc_ffn_hidden (on-chip)
    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [enc_ffn_hidden]
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "enc_ffn_hidden[batch, enc_seq_len, enc_ffn_mid] = enc_attn_proj[batch, enc_seq_len, enc_hidden] * enc_W_ffn_up[enc_hidden, enc_ffn_mid]"

    # GELU activation (elementwise copy)  ->  enc_ffn_hidden_act (on-chip)
    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [enc_ffn_hidden, enc_ffn_hidden_act]
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Compute
        component: Copy
        einsum: "enc_ffn_hidden_act[batch, enc_seq_len, enc_ffn_mid] = enc_ffn_hidden[batch, enc_seq_len, enc_ffn_mid]"

    # FFN down-projection  (on-chip act -> enc_ffn_out to DRAM)
    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [enc_ffn_hidden_act]
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "enc_ffn_out[batch, enc_seq_len, enc_embed_dim] = enc_ffn_hidden_act[batch, enc_seq_len, enc_ffn_mid] * enc_W_ffn_down[enc_ffn_mid, enc_embed_dim]"

  # ---------------------------------------------------------------------------
  # CLS pooling (un-fused; trivial gather)
  # ---------------------------------------------------------------------------
  - !Nested
    nodes:
    - !Temporal
      rank_variable: batch
      tile_shape: 1
    - !Compute
      component: Copy
      einsum: "query_embedding[batch, enc_embed_dim] = enc_ffn_out[batch, enc_seq_len, enc_embed_dim]"

  # ---------------------------------------------------------------------------
  # FAISS retrieval — un-fused (corpus too large for SRAM)
  # ---------------------------------------------------------------------------

  - !Nested
    nodes:
    - !Temporal
      rank_variable: batch
      tile_shape: 1
    - !Temporal
      rank_variable: num_docs
      tile_shape: 1
    - !Compute
      component: MAC
      einsum: "doc_scores[batch, num_docs] = query_embedding[batch, enc_embed_dim] * corpus_embeddings[num_docs, enc_embed_dim]"

  - !Nested
    nodes:
    - !Temporal
      rank_variable: batch
      tile_shape: 1
    - !Compute
      component: Copy
      einsum: "topk_doc_ids[batch, top_k_docs] = doc_scores[batch, num_docs]"

  - !Nested
    nodes:
    - !Temporal
      rank_variable: batch
      tile_shape: 1
    - !Temporal
      rank_variable: top_k_docs
      tile_shape: 1
    - !Compute
      component: MAC
      einsum: "topk_tokens[batch, top_k_docs, doc_len] = topk_doc_ids[batch, top_k_docs] * corpus_tokens[top_k_docs, doc_len]"

  - !Nested
    nodes:
    - !Temporal
      rank_variable: batch
      tile_shape: 1
    - !Compute
      component: Copy
      einsum: "dec_input[batch, dec_seq_len, dec_hidden] = topk_tokens[batch, top_k_docs, doc_len]"

  # ===========================================================================
  # [DEC-A]  Decoder QKV projections — fused (mirror of ENC-A)
  # ===========================================================================
  - !Sequential
    nodes:

    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [dec_input]
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: dec_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_queries[batch, dec_seq_len, dec_num_heads, dec_head_dim] = dec_input[batch, dec_seq_len, dec_hidden] * dec_W_query[dec_num_heads, dec_head_dim, dec_hidden]"

    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [dec_input]
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: dec_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_keys[batch, dec_seq_len, dec_num_heads, dec_head_dim] = dec_input[batch, dec_seq_len, dec_hidden] * dec_W_key[dec_num_heads, dec_head_dim, dec_hidden]"

    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [dec_input]
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: dec_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_values[batch, dec_seq_len, dec_num_heads, dec_head_dim] = dec_input[batch, dec_seq_len, dec_hidden] * dec_W_value[dec_num_heads, dec_head_dim, dec_hidden]"

  # ===========================================================================
  # [DEC-B]  Decoder attention kernel — aggressively fused (mirror of ENC-B)
  #
  # dec_attn_scores and dec_attn_weights stay on-chip.
  # dec_attn_out is consumed on-chip by the output projection in Step 4.
  # ===========================================================================
  - !Sequential
    nodes:

    # Step 1: Q·Kᵀ
    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [dec_attn_scores]
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: dec_kv_pos
        tile_shape: 1
      - !Temporal
        rank_variable: dec_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_attn_scores[batch, dec_seq_len, dec_kv_pos, dec_num_heads] = dec_queries[batch, dec_seq_len, dec_num_heads, dec_head_dim] * dec_keys[batch, DEC_SEQ_LEN: dec_kv_pos, dec_num_heads, dec_head_dim]"

    # Step 2: softmax copy
    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [dec_attn_scores, dec_attn_weights]
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: dec_kv_pos
        tile_shape: 1
      - !Temporal
        rank_variable: dec_num_heads
        tile_shape: 1
      - !Compute
        component: Copy
        einsum: "dec_attn_weights[batch, dec_seq_len, dec_kv_pos, dec_num_heads] = dec_attn_scores[batch, dec_seq_len, dec_kv_pos, dec_num_heads]"

    # Step 3: weighted value aggregation
    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [dec_attn_weights, dec_attn_out]
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: dec_kv_pos
        tile_shape: 1
      - !Temporal
        rank_variable: dec_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_attn_out[batch, dec_seq_len, dec_num_heads, dec_head_dim] = dec_attn_weights[batch, dec_seq_len, dec_kv_pos, dec_num_heads] * dec_values[batch, DEC_SEQ_LEN: dec_kv_pos, dec_num_heads, dec_head_dim]"

    # Step 4: output projection (dec_attn_out on-chip -> dec_attn_proj to DRAM)
    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [dec_attn_out]
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_attn_proj[batch, dec_seq_len, dec_hidden] = dec_attn_out[batch, dec_seq_len, dec_num_heads, dec_head_dim] * dec_W_out[dec_num_heads, dec_head_dim, dec_hidden]"

  # ===========================================================================
  # [DEC-C]  Decoder SwiGLU FFN — aggressively fused
  #
  # SwiGLU has three weight matrices (gate, up, down) unlike the encoder's two.
  # dec_ffn_gate, dec_ffn_up, dec_ffn_gate_act, dec_ffn_swiglu all stay on-chip.
  # Only dec_ffn_out is written back to DRAM as the layer output.
  #
  # Fusion order:
  #   gate_proj  ->  dec_ffn_gate  (on-chip)
  #   up_proj    ->  dec_ffn_up    (on-chip)     [reuse dec_attn_proj tile]
  #   SiLU copy  ->  dec_ffn_gate_act (on-chip)
  #   gate*up    ->  dec_ffn_swiglu (on-chip)
  #   down_proj  ->  dec_ffn_out   (DRAM)
  # ===========================================================================
  - !Sequential
    nodes:

    # Gate projection
    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [dec_ffn_gate]
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_ffn_gate[batch, dec_seq_len, dec_ffn_mid] = dec_attn_proj[batch, dec_seq_len, dec_hidden] * dec_W_ffn_gate[dec_hidden, dec_ffn_mid]"

    # Up projection
    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [dec_ffn_up]
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_ffn_up[batch, dec_seq_len, dec_ffn_mid] = dec_attn_proj[batch, dec_seq_len, dec_hidden] * dec_W_ffn_up[dec_hidden, dec_ffn_mid]"

    # SiLU activation (elementwise copy)
    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [dec_ffn_gate, dec_ffn_gate_act]
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Compute
        component: Copy
        einsum: "dec_ffn_gate_act[batch, dec_seq_len, dec_ffn_mid] = dec_ffn_gate[batch, dec_seq_len, dec_ffn_mid]"

    # SwiGLU element-wise multiply: SiLU(gate) * up
    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [dec_ffn_gate_act, dec_ffn_up, dec_ffn_swiglu]
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_ffn_swiglu[batch, dec_seq_len, dec_ffn_mid] = dec_ffn_gate_act[batch, dec_seq_len, dec_ffn_mid] * dec_ffn_up[batch, dec_seq_len, dec_ffn_mid]"

    # Down projection (on-chip swiglu -> dec_ffn_out to DRAM)
    - !Nested
      nodes:
      - !Storage
        component: OnChipSRAM
        tensors: [dec_ffn_swiglu]
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_ffn_out[batch, dec_seq_len, dec_hidden] = dec_ffn_swiglu[batch, dec_seq_len, dec_ffn_mid] * dec_W_ffn_down[dec_ffn_mid, dec_hidden]"
