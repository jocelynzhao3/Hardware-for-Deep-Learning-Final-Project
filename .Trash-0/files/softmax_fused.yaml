# =============================================================================
# mapping_attn_softmax_fused.yaml
#
# Fusion: attention scores + softmax only (enc + dec).
# enc_attn_scores and dec_attn_scores stay on OnChipSRAM; never hit DRAM.
#
# Structure:
#   - All !Storage at top level
#   - ONE !Sequential containing ALL !Nested blocks at the same indentation
# =============================================================================

mapping:
  nodes:

  - !Storage
    component: Disk
    tensors:
      - corpus_embeddings
      - corpus_tokens

  - !Storage
    component: MainMemory
    tensors:
      - enc_W_query
      - enc_W_key
      - enc_W_value
      - enc_W_out
      - enc_W_ffn_up
      - enc_W_ffn_dow
      - enc_input_raw
      - enc_input
      - enc_queries
      - enc_keys
      - enc_values
      - enc_attn_weights
      - enc_attn_out
      - enc_attn_proj
      - enc_ffn_hidden
      - enc_ffn_hidden_act
      - enc_ffn_out
      - query_embedding
      - doc_scores
      - topk_doc_ids
      - topk_tokens
      - dec_W_query
      - dec_W_key
      - dec_W_value
      - dec_W_out
      - dec_W_ffn_gate
      - dec_W_ffn_up
      - dec_W_ffn_down
      - dec_input
      - dec_queries
      - dec_keys
      - dec_values
      - dec_attn_weights
      - dec_attn_out
      - dec_attn_proj
      - dec_ffn_gate
      - dec_ffn_up
      - dec_ffn_gate_act
      - dec_ffn_swiglu
      - dec_ffn_out

  # Fused intermediates: live on-chip, never evicted to DRAM
  - !Storage
    component: OnChipSRAM
    tensors:
      - enc_attn_scores
      - dec_attn_scores

  # ---------------------------------------------------------------------------
  # Single top-level Sequential — all Nested at the same indentation level
  # ---------------------------------------------------------------------------
  - !Sequential
    nodes:

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Compute
        component: Copy
        einsum: "enc_input"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: enc_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "enc_queries[batch, enc_seq_len, enc_num_heads, enc_head_dim] = enc_input[batch, enc_seq_len, enc_hidden] * enc_W_query[enc_num_heads, enc_head_dim, enc_hidden]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: enc_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "enc_keys[batch, enc_seq_len, enc_num_heads, enc_head_dim] = enc_input[batch, enc_seq_len, enc_hidden] * enc_W_key[enc_num_heads, enc_head_dim, enc_hidden]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: enc_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "enc_values[batch, enc_seq_len, enc_num_heads, enc_head_dim] = enc_input[batch, enc_seq_len, enc_hidden] * enc_W_value[enc_num_heads, enc_head_dim, enc_hidden]"

    # --- FUSED: enc_attn_scores -> enc_attn_weights (both stay on OnChipSRAM) ---

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: enc_kv_pos
        tile_shape: 1
      - !Temporal
        rank_variable: enc_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "enc_attn_scores[batch, enc_seq_len, enc_kv_pos, enc_num_heads] = enc_queries[batch, enc_seq_len, enc_num_heads, enc_head_dim] * enc_keys[batch, ENC_SEQ_LEN: enc_kv_pos, enc_num_heads, enc_head_dim]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: enc_kv_pos
        tile_shape: 1
      - !Temporal
        rank_variable: enc_num_heads
        tile_shape: 1
      - !Compute
        component: Copy
        einsum: "enc_attn_weights[batch, enc_seq_len, enc_kv_pos, enc_num_heads] = enc_attn_scores[batch, enc_seq_len, enc_kv_pos, enc_num_heads]"

    # --- Encoder: value aggregation, output proj, FFN ---

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: enc_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "enc_attn_out[batch, enc_seq_len, enc_num_heads, enc_head_dim] = enc_attn_weights[batch, enc_seq_len, enc_kv_pos, enc_num_heads] * enc_values[batch, ENC_SEQ_LEN: enc_kv_pos, enc_num_heads, enc_head_dim]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "enc_attn_proj[batch, enc_seq_len, enc_hidden] = enc_attn_out[batch, enc_seq_len, enc_num_heads, enc_head_dim] * enc_W_out[enc_num_heads, enc_head_dim, enc_hidden]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "enc_ffn_hidden[batch, enc_seq_len, enc_ffn_mid] = enc_attn_proj[batch, enc_seq_len, enc_hidden] * enc_W_ffn_up[enc_hidden, enc_ffn_mid]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Compute
        component: Copy
        einsum: "enc_ffn_hidden_act[batch, enc_seq_len, enc_ffn_mid] = enc_ffn_hidden[batch, enc_seq_len, enc_ffn_mid]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: enc_seq_len
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "enc_ffn_out[batch, enc_seq_len, enc_embed_dim] = enc_ffn_hidden_act[batch, enc_seq_len, enc_ffn_mid] * enc_W_ffn_down[enc_ffn_mid, enc_embed_dim]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Compute
        component: Copy
        einsum: "query_embedding[batch, enc_embed_dim] = enc_ffn_out[batch, enc_seq_len, enc_embed_dim]"

    # --- FAISS retrieval ---

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: num_docs
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "doc_scores[batch, num_docs] = query_embedding[batch, enc_embed_dim] * corpus_embeddings[num_docs, enc_embed_dim]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Compute
        component: Copy
        einsum: "topk_doc_ids[batch, top_k_docs] = doc_scores[batch, num_docs]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: top_k_docs
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "topk_tokens[batch, top_k_docs, doc_len] = topk_doc_ids[batch, top_k_docs] * corpus_tokens[top_k_docs, doc_len]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Compute
        component: Copy
        einsum: "dec_input[batch, dec_seq_len, dec_hidden] = topk_tokens[batch, top_k_docs, doc_len]"

    # --- Decoder: QKV projections ---

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: dec_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_queries[batch, dec_seq_len, dec_num_heads, dec_head_dim] = dec_input[batch, dec_seq_len, dec_hidden] * dec_W_query[dec_num_heads, dec_head_dim, dec_hidden]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: dec_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_keys[batch, dec_seq_len, dec_num_heads, dec_head_dim] = dec_input[batch, dec_seq_len, dec_hidden] * dec_W_key[dec_num_heads, dec_head_dim, dec_hidden]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: dec_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_values[batch, dec_seq_len, dec_num_heads, dec_head_dim] = dec_input[batch, dec_seq_len, dec_hidden] * dec_W_value[dec_num_heads, dec_head_dim, dec_hidden]"

    # --- FUSED: dec_attn_scores -> dec_attn_weights (both stay on OnChipSRAM) ---

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: dec_kv_pos
        tile_shape: 1
      - !Temporal
        rank_variable: dec_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_attn_scores[batch, dec_seq_len, dec_kv_pos, dec_num_heads] = dec_queries[batch, dec_seq_len, dec_num_heads, dec_head_dim] * dec_keys[batch, DEC_SEQ_LEN: dec_kv_pos, dec_num_heads, dec_head_dim]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: dec_kv_pos
        tile_shape: 1
      - !Temporal
        rank_variable: dec_num_heads
        tile_shape: 1
      - !Compute
        component: Copy
        einsum: "dec_attn_weights[batch, dec_seq_len, dec_kv_pos, dec_num_heads] = dec_attn_scores[batch, dec_seq_len, dec_kv_pos, dec_num_heads]"

    # --- Decoder: value aggregation, output proj, SwiGLU FFN ---

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Temporal
        rank_variable: dec_num_heads
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_attn_out[batch, dec_seq_len, dec_num_heads, dec_head_dim] = dec_attn_weights[batch, dec_seq_len, dec_kv_pos, dec_num_heads] * dec_values[batch, DEC_SEQ_LEN: dec_kv_pos, dec_num_heads, dec_head_dim]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_attn_proj[batch, dec_seq_len, dec_hidden] = dec_attn_out[batch, dec_seq_len, dec_num_heads, dec_head_dim] * dec_W_out[dec_num_heads, dec_head_dim, dec_hidden]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_ffn_gate[batch, dec_seq_len, dec_ffn_mid] = dec_attn_proj[batch, dec_seq_len, dec_hidden] * dec_W_ffn_gate[dec_hidden, dec_ffn_mid]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_ffn_up[batch, dec_seq_len, dec_ffn_mid] = dec_attn_proj[batch, dec_seq_len, dec_hidden] * dec_W_ffn_up[dec_hidden, dec_ffn_mid]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Compute
        component: Copy
        einsum: "dec_ffn_gate_act[batch, dec_seq_len, dec_ffn_mid] = dec_ffn_gate[batch, dec_seq_len, dec_ffn_mid]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_ffn_swiglu[batch, dec_seq_len, dec_ffn_mid] = dec_ffn_gate_act[batch, dec_seq_len, dec_ffn_mid] * dec_ffn_up[batch, dec_seq_len, dec_ffn_mid]"

    - !Nested
      nodes:
      - !Temporal
        rank_variable: batch
        tile_shape: 1
      - !Temporal
        rank_variable: dec_seq_len
        tile_shape: 1
      - !Compute
        component: MAC
        einsum: "dec_ffn_out[batch, dec_seq_len, dec_hidden] = dec_ffn_swiglu[batch, dec_seq_len, dec_ffn_mid] * dec_W_ffn_down[dec_ffn_mid, dec_hidden]"